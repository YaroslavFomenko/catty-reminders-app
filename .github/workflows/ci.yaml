name: CI

on:
  push:
    branches:
      - lab2
      - lab2_autotests*
  pull_request:
    branches:
      - lab2
      - lab2_autotests*

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn pytest-playwright
          playwright install --with-deps chromium

      - name: Start app
        run: |
          echo "SECRET_KEY=test" > .env
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 > app.log 2>&1 &
          for i in $(seq 1 15); do
            if curl -s http://127.0.0.1:8181/login > /dev/null 2>&1; then
              echo "App started!"
              break
            fi
            echo "Attempt $i..."
            sleep 2
          done
          cat app.log

      - name: Run all tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --junitxml=test_result.xml --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
