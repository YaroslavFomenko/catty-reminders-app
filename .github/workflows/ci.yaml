name: CI

on:
  push:
    branches: [lab2]
  pull_request:
    branches: [lab2]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Start application
        run: |
          cp .env.example .env 2>/dev/null || echo "SECRET_KEY=test" > .env
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          sleep 3
      
      - name: Run API tests
        run: |
          python -m pytest tests/test_api.py tests/test_unit.py --tb=short -q
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_results
          path: |
            test_results.xml
            .pytest_cache/
