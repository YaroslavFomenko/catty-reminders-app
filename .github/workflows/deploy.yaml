name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: yaroslav
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3124
          script: |
            set -e
            cd /home/yaroslav/devops-lab/catty-reminders-app
            git fetch origin
            git reset --hard origin/lab4
            
            OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
            IMAGE="ghcr.io/$OWNER/catty-reminders-app:${{ github.sha }}"
            
            cat > .env << ENVEOF
            IMAGE=$IMAGE
            DEPLOY_REF=${{ github.sha }}
            MYSQL_ROOT_PASSWORD=catty_password
            MYSQL_DATABASE=catty_db
            MYSQL_USER=catty_user
            MYSQL_PASSWORD=catty_password
            ENVEOF
            
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f
