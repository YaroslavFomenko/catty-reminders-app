name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: yaroslav
          port: 3124
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/yaroslav/devops-lab/catty-reminders-app
            
            export IMAGE=ghcr.io/yaroslavfomenko/catty-reminders-app:${{ github.sha }}
            export APP_CONTAINER_NAME=catty-app
            export MARIADB_ROOT_PASSWORD=mypass
            export MARIADB_USER=yaroslav
            export MARIADB_PASSWORD=mypass
            export MARIADB_DATABASE=catty_reminders
            export HOST_DB_PORT=3306
            export CONTAINER_DB_PORT=3306
            export HOST_APP_PORT=8181
            export CONTAINER_APP_PORT=8181
            export DEPLOY_REF=${{ github.sha }}
            
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker-compose up -d --pull always --remove-orphans --force-recreate
            
            sleep 10
            docker exec -i catty-db mariadb -u root -pmypass catty_reminders -e "CREATE TABLE IF NOT EXISTS users (username VARCHAR(255) PRIMARY KEY, password VARCHAR(255)); INSERT IGNORE INTO users VALUES ('tester', 'foobar123');" || true
